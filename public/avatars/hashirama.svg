<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs><clipPath id="c"><circle cx="50" cy="50" r="50"/></clipPath></defs>
  <g clip-path="url(#c)">
    <circle cx="50" cy="50" r="50" fill="#16a34a"/>
    <!-- Long brown side hair -->
    <rect x="18" y="28" width="12" height="72" rx="6" fill="#6b3a1e"/>
    <rect x="70" y="28" width="12" height="72" rx="6" fill="#6b3a1e"/>
    <!-- Top hair -->
    <ellipse cx="50" cy="24" rx="24" ry="15" fill="#6b3a1e"/>
    <!-- Face -->
    <ellipse cx="50" cy="59" rx="20" ry="22" fill="#fde8d0"/>
    <!-- Red diamond forehead mark -->
    <polygon points="50,36 54.5,42 50,48 45.5,42" fill="#dc2626"/>
    <!-- Eyebrows (calm arched) -->
    <path d="M36 51 Q42 47 48 51" stroke="#5c3a1e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M52 51 Q58 47 64 51" stroke="#5c3a1e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Left eye -->
    <ellipse cx="42" cy="57" rx="5.5" ry="6" fill="white"/>
    <circle cx="42" cy="58" r="3.8" fill="#1a4a1e"/>
    <circle cx="44" cy="56" r="1.4" fill="white"/>
    <!-- Right eye -->
    <ellipse cx="58" cy="57" rx="5.5" ry="6" fill="white"/>
    <circle cx="58" cy="58" r="3.8" fill="#1a4a1e"/>
    <circle cx="60" cy="56" r="1.4" fill="white"/>
    <!-- Nose -->
    <ellipse cx="50" cy="66" rx="1.8" ry="1.1" fill="#e0a882"/>
    <!-- Gentle smile -->
    <path d="M42 72 Q50 78 58 72" stroke="#c07850" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  </g>
</svg>
