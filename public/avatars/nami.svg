<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs><clipPath id="c"><circle cx="50" cy="50" r="50"/></clipPath></defs>
  <g clip-path="url(#c)">
    <circle cx="50" cy="50" r="50" fill="#ea580c"/>
    <!-- Orange wavy hair (back layer) -->
    <ellipse cx="50" cy="22" rx="26" ry="16" fill="#d4500a"/>
    <ellipse cx="20" cy="45" rx="10" ry="30" fill="#d4500a"/>
    <ellipse cx="80" cy="45" rx="10" ry="30" fill="#d4500a"/>
    <!-- Hair flow on right -->
    <ellipse cx="78" cy="60" rx="8" ry="22" fill="#c44808"/>
    <!-- Face -->
    <ellipse cx="50" cy="59" rx="20" ry="22" fill="#fde8d0"/>
    <!-- Hair forelock -->
    <path d="M30 28 Q35 18 50 20 Q40 25 38 35" fill="#d4500a"/>
    <!-- Eyebrows (feminine arched) -->
    <path d="M36 51 Q42 46 48 50" stroke="#7a3010" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M52 50 Q58 46 64 51" stroke="#7a3010" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Left eye (bright) -->
    <ellipse cx="42" cy="57" rx="5.5" ry="6" fill="white"/>
    <circle cx="42" cy="58" r="4" fill="#8b4513"/>
    <circle cx="40" cy="56" r="1.5" fill="white"/>
    <!-- Right eye -->
    <ellipse cx="58" cy="57" rx="5.5" ry="6" fill="white"/>
    <circle cx="58" cy="58" r="4" fill="#8b4513"/>
    <circle cx="56" cy="56" r="1.5" fill="white"/>
    <!-- Eyelashes -->
    <path d="M37 53 Q42 50 47 53" stroke="#7a3010" stroke-width="1.2" fill="none"/>
    <path d="M53 53 Q58 50 63 53" stroke="#7a3010" stroke-width="1.2" fill="none"/>
    <!-- Nose -->
    <ellipse cx="50" cy="65" rx="1.5" ry="1" fill="#e0a882"/>
    <!-- Sly smile (right corner higher) -->
    <path d="M42 72 Q50 76 58 70" stroke="#c07850" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  </g>
</svg>
